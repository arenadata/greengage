---

version: "3"
services:
  cdw:
    image: "${IMAGE}"
    working_dir: /home/gpadmin
    hostname: cdw
    volumes:
      - "$PWD/ssh_keys:/home/gpadmin/.ssh.src"
      - "$PWD/allure-results:/tmp/allure-results"
      - "$PWD/logs_cdw:/logs"
    privileged: true
    sysctls:
      kernel.sem: 500 1024000 200 4096
    init: true
    ulimits:
      nofile: 65535
    entrypoint: >
      sleep infinity
  sdw1:
    image: "${IMAGE}"
    privileged: true
